<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Rezervace – Menu Zajíc, Lhota Rapotina.">
  <meta name="theme-color" content="#B5342B">
  <title>Rezervace – Lhota Rapotina</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/zajic.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <header class="site-header">
    <a href="lhota-rapotina.html" class="site-header__back">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Zpět</span>
    </a>
    <div class="site-header__center">
      <img src="images/zajic.png" alt="Logo" class="site-header__logo">
      <span class="site-header__location">Rezervace</span>
    </div>
  </header>

  <div class="page-content">
    <div style="text-align:center; padding: 4rem 1rem;">
      <i class="fa-solid fa-calendar-check" style="font-size:3rem; color:var(--color-brick); margin-bottom:1.5rem; display:block;"></i>
      <h1 style="font-size:1.8rem; font-weight:700; color:var(--color-brick); margin-bottom:1rem;">Rezervace</h1>
      <p style="font-size:1.1rem; color:var(--color-text-light); max-width:500px; margin:0 auto; line-height:1.7;">
        Stránka rezervací pro Lhotu Rapotinu se připravuje.<br>
        Pro rezervaci nás prosím zavolejte na <a href="tel:+420736609135" style="color:var(--color-brick); font-weight:600;">736 609 135</a>.
      </p>
    </div>
  </div>

  <footer class="site-footer">
    <span class="site-footer__copy">&copy; 2026 U Zajíce</span>
    <span class="site-footer__divider">|</span>
    <span class="site-footer__credit">Designed by Triangl</span>
  </footer>

  <div class="cookie-banner" id="cookie-banner" role="dialog" aria-label="Cookies">
    <div class="cookie-banner__inner">
      <p class="cookie-banner__text">Tento web používá cookies pro zajištění funkčnosti a analýzu návštěvnosti. Používáním webu souhlasíte s využitím cookies.</p>
      <button class="cookie-banner__btn" id="cookie-accept">Rozumím</button>
    </div>
  </div>

  <script>
  (function(){
    var banner=document.getElementById('cookie-banner');
    var btn=document.getElementById('cookie-accept');
    if(localStorage.getItem('cookies-accepted')){banner.remove();return;}
    btn.addEventListener('click',function(){
      localStorage.setItem('cookies-accepted','1');
      banner.classList.add('cookie-banner--hidden');
      setTimeout(function(){banner.remove();},400);
    });
  })();
  </script>

  <script>
  document.querySelectorAll('a[href]').forEach(function(a){
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('tel')||href.startsWith('mailto')||a.target==='_blank')return;
    a.addEventListener('click',function(e){
      e.preventDefault();
      document.body.classList.add('page-leaving');
      setTimeout(function(){location.href=href;},250);
    });
  });
  </script>
</body>
</html>
